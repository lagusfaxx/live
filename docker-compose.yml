services:
  livekit:
    build:
      context: ./livekit
      dockerfile: Dockerfile
    entrypoint: ["/usr/local/bin/start-livekit.sh"]
    command: []
    restart: unless-stopped
    environment:
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}"
    ports:
      - "7880:7880/tcp"
      - "7881:7881/tcp"
      - "50000-50100:50000-50100/udp"

  coturn:
    image: coturn/coturn:4.6.3
    restart: unless-stopped
    command:
      - -c
      - /etc/coturn/turnserver.conf
      - --realm=${TURN_REALM}
      - --static-auth-secret=${TURN_STATIC_AUTH_SECRET}
      - --external-ip=${PUBLIC_IPV4}
    ports:
      - "3478:3478/tcp"
      - "3478:3478/udp"
      - "5349:5349/tcp"
      - "5349:5349/udp"
      - "49160-49200:49160-49200/udp"
    volumes:
      - ./turn/turnserver.conf:/etc/coturn/turnserver.conf:ro

  live-token-api:
    build:
      context: ./token-service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: 3000
      NODE_ENV: production
      LIVEKIT_URL: ${LIVEKIT_URL}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN}
      SHARED_BEARER_TOKEN: ${SHARED_BEARER_TOKEN}
      DEFAULT_CAN_PUBLISH: ${DEFAULT_CAN_PUBLISH:-false}
    ports:
      - "3001:3000/tcp"
