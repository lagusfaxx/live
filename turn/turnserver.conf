listening-port=3478
tls-listening-port=5349

fingerprint
use-auth-secret

# Estos 3 parámetros se inyectan por flags en docker-compose:
# --realm
# --static-auth-secret
# --external-ip

min-port=49160
max-port=49200

# Seguridad / estabilidad
no-cli
no-multicast-peers
no-loopback-peers
stale-nonce=600
total-quota=100

# Certificados TLS opcionales (habilítalos si usas 5349 con TLS)
# cert=/etc/coturn/certs/fullchain.pem
# pkey=/etc/coturn/certs/privkey.pem

simple-log
